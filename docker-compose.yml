services:
  # ==========================================
  # Backend .NET 8 con SQLite
  # ==========================================
  api:
    build:
      context: ./Meta-xi-Api-main/Meta-xi-Api-main
      dockerfile: Dockerfile
    container_name: meta-xi-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:5071}
      - JwtSettings__Secret=${JWT_SECRET:-super secret key for new project with the 512 bytes patreon , thanks for user my app}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-default-api-key-change-me}
    volumes:
      - sqlite-data:/app/Data
    ports:
      - "5000:5071"
    networks:
      - meta-xi-net

  # ==========================================
  # Frontend Angular + Nginx (reverse proxy)
  # ==========================================
  client:
    build:
      context: ./Meta-xi-Client-main/Meta-xi-Client-main
      dockerfile: Dockerfile
    container_name: meta-xi-client
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - meta-xi-net

  # ==========================================
  # Telegram Bot (Python)
  # ==========================================
  bot:
    build:
      context: ./Bot
      dockerfile: Dockerfile
    container_name: meta-xi-bot
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_IDS=${ADMIN_IDS}
      - API_BASE_URL=http://api:5000
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    depends_on:
      - api
    networks:
      - meta-xi-net

volumes:
  sqlite-data:

networks:
  meta-xi-net:
    driver: bridge