<!-- Background -->

<div class="bg-container">
  <div class="bg-yellow-diagonal"></div>
  <div class="bg-red-diamond"></div>
</div>

<!-- Payment View -->
<div class="main-content" [style.display]="showSuccess ? 'none' : 'flex'">
  <div class="logo-container">
    <div class="dot"></div>
    <span class="logo-text">DaviPlata</span>
  </div>

  <p class="info-text">Número de orden:</p>
  <p class="order-id">{{ orderNumber }}</p>
  <p class="amount">{{ displayAmount }}</p>

  <div class="qr-box">
    <img src="assets/qr/Daviplata.jpg" alt="Código QR DaviPlata" (error)="handleQrError($event)" />
  </div>

  <p class="qr-footer-text">Código QR de DAVIPLATA</p>

  <input
    type="text"
    class="input-ref"
    placeholder="Por favor ingrese una referencia"
    [(ngModel)]="reference"
  />

  <div class="instructions">
    <b>1. Scan the QR code to make payment</b>
    <b
      >2. Enter the transaction serial number after the transaction is
      completed.</b
    >
  </div>

  <button
    class="btn btn-blue"
    [disabled]="!canConfirm"
    [attr.aria-busy]="submitting"
    [attr.aria-disabled]="!canConfirm"
    (click)="onConfirm()"
  >
    <span *ngIf="!submitting">Confirmar</span>
    <span *ngIf="submitting">Enviando...</span>
  </button>
</div>

<!-- Success Screen -->
<div class="success-screen" [style.display]="showSuccess ? 'flex' : 'none'">
  <div class="logo-container">
    <div class="dot"></div>
    <span class="logo-text">DaviPlata</span>
  </div>

  <div class="check-icon"></div>

  <p class="final-text">El pedido está en revisión,<br />espere</p>
  <p class="final-text" style="font-size: 20px; margin-top: 10px">
    Por favor cierre esta pagina
  </p>

  <button class="btn btn-white" [routerLink]="['/home']">Cerrar</button>
</div>
