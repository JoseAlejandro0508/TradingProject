
<div class="deposit-wrap">
    <!-- Back Nav -->
    <a routerLink="/home" class="back-nav">
        <div class="arrow-gold"></div>
        <span class="nav-label">Volver</span>
    </a>

    <!-- Gold Master Card Frame -->
    <div class="master-card">
        <div class="inner-container">

            <!-- Balance -->
            <div class="balance-header">
                <span class="balance-title">Balance de cuenta</span>
                <span class="balance-val">$ {{ displayBalance }}</span>
            </div>

            <!-- Input -->
            <input type="text"
                   class="input-box"
                   placeholder="0"
                   [ngModel]="displayAmount"
                   (ngModelChange)="onAmountInput($event)">

            <!-- Preset Amounts -->
            <div class="amounts-grid">
                @for (amt of presets; track amt.value) {
                    <button class="amount-btn"
                            [class.selected]="rawAmount === amt.value"
                            (click)="selectAmount(amt.value)">
                        ${{ amt.label }}
                    </button>
                }
            </div>

            <!-- Payment Method (Nequi fijo) -->
            <div class="payment-method-row">
                <div class="icon-box-vip">
                    <div class="inner-glow-emu"></div>
                    <img src="assets/token/nequi-account.png" class="method-img" alt="Nequi">
                </div>
                <span class="method-name-text">Nequi Digital</span>
                <div class="chevron-gold"></div>
            </div>

            <!-- Confirm Button -->
            <button class="btn-confirm"
                    [class.active]="rawAmount >= MIN_AMOUNT"
                    [disabled]="rawAmount < MIN_AMOUNT"
                    [routerLink]="['/nequi', 'nequi']"
                    [queryParams]="{cantidad: rawAmount}">
                Confirmar Recarga
            </button>

        </div>
    </div>

    <!-- Legal Info -->
    <div class="legal-info">
        1. Recarga mínima: <b class="emerald">50,000 COP</b> para activar botón.<br>
        2. Al confirmar, capture su Código QR generado.<br>
        3. Acreditación automática en <b class="emerald">1-10 minutos</b>.
    </div>
</div>
