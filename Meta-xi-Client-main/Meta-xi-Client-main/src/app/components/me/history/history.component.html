<div class="history-page">
  <!-- Back Button -->
  <div class="back-container">
    <button class="btn-back-simple" (click)="goBack()">&lt; Atrás</button>
  </div>

  <!-- Main Panel -->
  <div class="history-panel">
    <div class="history-header">
      <h2>TRANSACCIONES</h2>
      <p>Historial</p>
    </div>

    <!-- Tabs -->
    <div class="tab-container">
      <button
        class="tab-btn tab-all"
        [class.active]="activeTab === 'all'"
        (click)="filterByTab('all')"
      >
        Todas
      </button>
      <button
        class="tab-btn tab-deposit"
        [class.active]="activeTab === 'deposit'"
        (click)="filterByTab('deposit')"
      >
        Recargas
      </button>
      <button
        class="tab-btn tab-withdraw"
        [class.active]="activeTab === 'withdraw'"
        (click)="filterByTab('withdraw')"
      >
        Retiros
      </button>
    </div>

    <!-- Loading State -->
    <div class="loading-state" *ngIf="loading">
      <div class="empty-icon">⏳</div>
      <div class="empty-text">Cargando transacciones...</div>
    </div>

    <!-- Transaction List -->
    <div class="transaction-list" *ngIf="!loading">
      <!-- Empty State -->
      <div class="empty-history" *ngIf="filteredTransactions.length === 0">
        <div class="empty-icon">📂</div>
        <div class="empty-text">No hay transacciones aún</div>
      </div>

      <!-- Transaction Cards -->
      <div
        class="tx-card"
        *ngFor="let tx of filteredTransactions"
        [ngClass]="getCardClass(tx.type, tx.status)"
      >
        <div class="tx-card-surface"></div>
        <div class="tx-left">
          <div class="tx-icon-box">
            <div
              class="icon-svg"
              [ngClass]="getIconClass(tx.type, tx.status)"
            ></div>
          </div>
          <div class="tx-info">
            <span class="tx-title">{{ tx.title }}</span>
            <span class="tx-date">{{ tx.date }}</span>
          </div>
        </div>
        <div class="tx-right">
          <span class="tx-amount">{{ tx.signedAmount }}</span>
          <span class="tx-status">{{ tx.status }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
