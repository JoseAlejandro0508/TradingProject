<div class="vip-card-container">
  <div class="inner-wrapper">
    <div class="edge-shading"></div>

    <!-- Progress bar -->
    <div class="progress-container">
      <div class="progress-bar" [style.width]="progressWidth" [style.transition]="progressTransition"></div>
    </div>

     <!--Track -->
    <div class="track" [style.transform]="'translateX(-' + currentIndex * 100 + '%)'">
      @for (slide of slides; track slide.id) {
        <div class="slide">
          <img [src]="slide.image" [alt]="slide.title" (error)="handleImgError($event)">
          <!--
          <div class="content">
            <h3>{{ slide.title }}</h3>
            <p>{{ slide.subtitle }}</p>
          </div>
          -->
        </div>
      }
    </div>
  </div>
</div>
