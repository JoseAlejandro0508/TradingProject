<div class="theme-switch-wrapper">
  <input
    type="checkbox"
    class="theme-switch-checkbox"
    id="theme-toggle-check"
    [checked]="isDark"
    (change)="toggleTheme()"
  />
  <label class="theme-switch-label" for="theme-toggle-check">
    <svg style="fill: #ffb020;" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5" />
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
    </svg>
    <svg style="fill: #2962ff;" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
    <div class="theme-switch-ball"></div>
  </label>
</div>
