@if (!isLogined) {
<nav
  [ngClass]="{
    'nav-background transition-colors duration-500': !isMeRoute && isScrolled,
    'bg-transparent transition-colors duration-500': !isMeRoute && !isScrolled
  }"
  class="fixed top-0 z-20 w-full flex items-center justify-between box-border nav-bar px-4"
>
  <div class="flex items-center gap-2">
    <img src="assets/icons/logo.webp" alt="nequi" class="logo rounded-full" />
    <section class="log-cont">
      <div class="logo-container">
        <svg viewBox="0 0 1100 150">
          <text x="35%" y="50%" class="animated-text">  TRUMP INVESTING</text>
        </svg>
      </div>
    </section>
  </div>
  <!--

    <button
    (click)="toggleModal()"
    class="flex items-center bg-[#0E2954] rounded-full gap-2 px-3 py-1 text-sm btn-alt"
  >
    <img [src]="address" alt="dailyquest" class="w-4 -mt-1 icono" />
    <p>{{ text }}</p>
  </button>
  -->

  <!-- Welcome Bonus button removed — now handled by /welcome blocking screen -->

  <div
    class="premium-btn-wrapper flex items-center rounded-full gap-2 px-3 py-1 text-sm btn-alt"
    (click)="toggleModal()"
  >
    <div class="badge-new-floating">NUEVO</div>
    <button class="btn-tareas-final">
      <div class="liquid-border-v4"></div>
      Tareas
    </button>
  </div>

</nav>

<!-- Modal -->
<div
  *ngIf="showModal"
  class="fixed inset-0 z-30 flex items-center justify-center bg-black/75"
>
  <!-- Ventana emergente -->
  <div
    class="relative bg-transparent ackdrop-blur-sm rounded-lg shadow-lg p-5 w-96 flex flex-col items-center gap-4"
  >
    <!-- Imagen -->
    <img
      src="assets/new/1.png"
      alt="Modal Content"
      class="rounded-lg w-full object-cover"
    />

    <!-- Botón de continuar -->
    <button
      (click)="GetBonus()"
      class="bg-[#C084FC] hover:bg-[#9333EA] text-white px-6 py-2 rounded-lg shadow-md mt-[-20px]"
    >
      Continuar
    </button>
  </div>
</div>
}
