<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trump Investing - VIP Welcome</title>
    <style>
        /* Fuentes de Google para un aspecto Premium */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #0d2017 0%, #050a07 100%);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Fondo Distorsionado / Desenfoque VIP */
        body::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(197,160,89,0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: 0;
            animation: floatBackground 10s ease-in-out infinite alternate;
        }

        @keyframes floatBackground {
            0% { transform: translate(-5%, -5%); }
            100% { transform: translate(5%, 5%); }
        }

        /* Contenedor del Recuadro Principal (Glassmorphism) */
        .vip-card-container {
            position: relative;
            z-index: 10;
            background: rgba(10, 25, 18, 0.65);
            border: 2px solid rgba(197, 160, 89, 0.4);
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 
                        0 0 30px rgba(197, 160, 89, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            text-align: center;
        }

        /* Marco exacto para la foto con Reflejo Dorado Interno */
        .photo-frame {
            width: 100%;
            aspect-ratio: 1 / 1; /* Mantiene la proporción cuadrada de tu imagen */
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(197, 160, 89, 0.6);
            /* El truco del reflejo dorado apuntando hacia adentro */
            box-shadow: inset 0 0 25px rgba(197, 160, 89, 0.5), 
                        inset 0 0 50px rgba(0, 0, 0, 0.9),
                        0 0 15px rgba(197, 160, 89, 0.2);
            background-color: #030705;
            margin-bottom: 25px;
            position: relative;
        }

        /* Capa superpuesta para dar el destello de luz dorada ambiental sobre la foto */
        .photo-frame::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Un gradiente suave que simula la luz dorada reflejándose en el cristal interno */
            background: linear-gradient(135deg, rgba(197, 160, 89, 0.15) 0%, rgba(0, 0, 0, 0) 50%, rgba(197, 160, 89, 0.05) 100%);
            pointer-events: none; /* Permite que no interfiera con clicks */
            z-index: 2;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 1;
        }

        /* Botón Premium con Resplandor Dorado */
        .btn-premium {
            background: linear-gradient(135deg, #113825 0%, #081c12 100%);
            border: 2px solid #c5a059;
            color: #e6c687;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4), 
                        0 0 10px rgba(197, 160, 89, 0.2);
            width: 100%;
            max-width: 350px;
        }

        .btn-premium:hover {
            color: #ffffff;
            border-color: #f3d08c;
            box-shadow: 0 7px 20px rgba(197, 160, 89, 0.4);
            transform: translateY(-2px);
        }

        .btn-premium:active {
            transform: translateY(1px);
        }

        /* Efecto de resplandor pasando cada 3.3 segundos */
        .btn-premium::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(243, 208, 140, 0.6) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-30deg);
            animation: goldShine 3.3s infinite ease-in-out;
        }

        @keyframes goldShine {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* Notificación VIP Superior */
        .notification {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #0d291b 0%, #17422d 100%);
            border: 2px solid #c5a059;
            border-radius: 10px;
            padding: 15px 30px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(197, 160, 89, 0.3);
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: none;
            opacity: 0;
        }

        .notification.show {
            top: 30px;
            opacity: 1;
        }

        .notification-icon {
            color: #c5a059;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="notification" id="vipNotification">
        <span class="notification-icon">👑</span>
        <span>Recibió 5,000 COP a su balance</span>
    </div>

    <div class="vip-card-container">
        
        <div class="photo-frame">
            <img src="tu_foto.png" alt="Trump Investing VIP Gift">
        </div>

        <button class="btn-premium" onclick="mostrarNotificacion()">
            Recibir 5,000 COP
        </button>

    </div>

    <script>
        function mostrarNotificacion() {
            const notification = document.getElementById('vipNotification');
            
            // Evita duplicar transiciones si se presiona rápido
            notification.classList.remove('show');
            void notification.offsetWidth; // Trigger reflow para reiniciar la animación
            
            // Añade la clase para mostrarla
            notification.classList.add('show');
            
            // La oculta automáticamente después de 4 segundos
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }
    </script>

</body>
</html>
