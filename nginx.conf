server {
    listen 80;
    server_name _;

    # ==========================================
    # Angular Static Files (Angular 17+ con application builder)
    # ==========================================
    root /usr/share/nginx/html;
    index index.html index.htm;

    # SPA: cualquier ruta que no sea /api sirve el index.html de Angular
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ==========================================
    # Reverse Proxy al Backend .NET
    # ==========================================
    location /api/ {
        proxy_pass http://api:5071/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Swagger si lo necesitas accesible
    location /swagger/ {
        proxy_pass http://api:5071/swagger/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static images served from backend wwwroot/plans
    location /plans/ {
        proxy_pass http://api:5071/plans/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache estático (CSS, JS, imágenes)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}