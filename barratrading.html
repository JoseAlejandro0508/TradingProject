<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView Nav</title>
    <style>
        /* --- ESTILOS BASE COMPARTIDOS (Estilo TradingView) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Elimina el flash azul nativo en móviles */
        }

        body {
            background-color: #0c0d14; /* Fondo oscuro profundo característico de trading */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 30px;
            overflow: hidden;
        }

        /* --- CONTENEDOR FLOTANTE --- */
        .nav-container {
            position: relative;
            background: rgba(28, 32, 48, 0.75); /* Efecto cristal translúcido */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 8px 16px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- BOTONES DE NAVEGACIÓN --- */
        .nav-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 68px;
            color: #848e9c; /* Gris neutro desactivado */
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2px;
            transition: color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden; /* Necesario para el efecto ripple */
        }

        /* Iconos SVG */
        .nav-item svg {
            width: 24px;
            height: 24px;
            margin-bottom: 5px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- ESTADOS ACTIVO Y HOVER --- */
        .nav-item:hover {
            color: #e9ecef;
        }

        .nav-item.active {
            color: #2962ff; /* Azul eléctrico institucional de TradingView */
        }

        /* Animación sutil del icono al activarse */
        .nav-item.active svg {
            transform: scale(1.1) translateY(-2px);
            stroke-width: 2.2;
        }

        /* --- INDICADOR FLOTANTE TRASERO --- */
        .nav-indicator {
            position: absolute;
            left: 16px; /* Sincronizado con el padding izquierdo del contenedor */
            height: 68px;
            width: 80px;
            background: rgba(41, 98, 255, 0.08); /* Fondo azul sutil */
            border: 1px solid rgba(41, 98, 255, 0.2);
            border-radius: 16px;
            z-index: 1;
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            pointer-events: none;
        }

        /* --- EFECTO DE TOQUE PROFESIONAL (RIPPLE EFFECT) --- */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(41, 98, 255, 0.25);
            transform: scale(0);
            animation: ripple-animation 0.5s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <nav class="nav-container">
        <!-- Indicador de fondo que se mueve -->
        <div class="nav-indicator" id="indicator"></div>

        <!-- Inicio -->
        <a class="nav-item active" onclick="setActive(this, 0)">
            <svg viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span>Inicio</span>
        </a>

        <!-- Inversiones (Gráfico/Mercados) -->
        <a class="nav-item" onclick="setActive(this, 1)">
            <svg viewBox="0 0 24 24">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Inversiones</span>
        </a>

        <!-- Cartera -->
        <a class="nav-item" onclick="setActive(this, 2)">
            <svg viewBox="0 0 24 24">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"></rect>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
            <span>Cartera</span>
        </a>

        <!-- Perfil -->
        <a class="nav-item" onclick="setActive(this, 3)">
            <svg viewBox="0 0 24 24">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span>Perfil</span>
        </a>
    </nav>

    <script>
        function setActive(element, index) {
            // 1. Gestionar clases activas
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            element.classList.add('active');

            // 2. Mover el indicador flotante (Ancho del botón 80px + Gap de 8px)
            const indicator = document.getElementById('indicator');
            const step = 80 + 8; 
            indicator.style.transform = `translateX(${index * step}px)`;

            // 3. Crear el efecto de onda (Ripple) en la posición exacta del toque
            createRipple(element);
        }

        function createRipple(element) {
            // Eliminar ondas anteriores si el usuario cliquea demasiado rápido
            const oldRipple = element.querySelector('.ripple');
            if (oldRipple) oldRipple.remove();

            const circle = document.createElement('span');
            circle.classList.add('ripple');

            // Centrar la onda expansiva en el botón de manera fluida
            const diameter = Math.max(element.clientWidth, element.clientHeight);
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${element.clientWidth / 2 - diameter / 2}px`;
            circle.style.top = `${element.clientHeight / 2 - diameter / 2}px`;

            element.appendChild(circle);
        }
    </script>

</body>
</html>
